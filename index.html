<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="scores">
  <span id="score">SCORE: 0</span>
  <span id="best">BEST: 0</span>
</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">press any arrow key to start</div>

<div id="modal" class="hidden">
  <div id="modal-box">
    <div id="modal-title">YOU WIN</div>
    <div id="modal-sub"></div>
    <div id="modal-actions">
      <button id="btn-replay">play again</button>
      <button id="btn-endless">endless mode</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
